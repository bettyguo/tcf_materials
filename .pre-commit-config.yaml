repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'    # trailing whitespace in MD is meaningful (line breaks)
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=2048']
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: audit-french
        name: audit-french (schema only; full audit runs in CI)
        entry: uv run python -m tools.cli audit --schema-only
        language: system
        types: [markdown]
        pass_filenames: false
