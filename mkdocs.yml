site_name: TCF Canada — Préparation B1 → C1
site_description: >
  Corpus open-source de préparation au TCF Canada, audité ligne à ligne,
  multi-format (web, PDF, EPUB, Anki). Objectif NCLC 8–9 en 12 semaines.
site_author: TCF Canada Prep contributors
site_url: https://bettyguo.github.io/tcf_materials/
docs_dir: content
site_dir: site
use_directory_urls: true
strict: true

repo_name: bettyguo/tcf_materials
repo_url: https://github.com/bettyguo/tcf_materials
edit_uri: edit/main/content/

theme:
  name: material
  language: fr
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    logo: material/book-open-page-variant

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search:
      lang:
        - fr
        - en
  - awesome-pages

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Lien permanent
      title: Sur cette page
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

hooks:
  - tools/mkdocs_estimated_minutes.py
  - tools/mkdocs_external_refs.py

extra:
  # Used by mkdocs_external_refs.py to rewrite repo-relative links (framing
  # docs, ROADMAP, BACKLOG, tools/, references.bib, etc.) into absolute
  # GitHub URLs at build time.
  repo_url: https://github.com/bettyguo/tcf_materials/blob/main
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bettyguo/tcf_materials
      name: Code source sur GitHub
  generator: false
  status:
    new: Nouveau dans la v1.0
    deprecated: Déprécié

copyright: >
  Contenu sous <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> ·
  Outils sous <a href="https://opensource.org/licenses/MIT">MIT</a> ·
  Audit pipeline open-source.
