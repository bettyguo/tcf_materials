site_name: TCF Canada — Préparation B1→C1
site_description: Corpus de préparation au TCF Canada, audité, multi-format.
site_author: TCF Canada Prep contributors
site_url: https://example.invalid/tcf-canada-prep/
docs_dir: content
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: material
  language: fr
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: fr
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true

hooks:
  - tools/mkdocs_estimated_minutes.py
  - tools/mkdocs_external_refs.py

extra:
  # Used by mkdocs_external_refs.py to rewrite repo-relative links (framing
  # docs, ROADMAP, BACKLOG, tools/, references.bib, etc.) into absolute
  # GitHub URLs. Override at deploy time if forking.
  repo_url: https://github.com/example/tcf-canada-prep/tree/main
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/

copyright: >
  CC-BY-SA 4.0 (contenu) · MIT (outils).
